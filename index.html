<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Panel del Huerto — Ciudad Serdán</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<meta name="theme-color" content="#0f172a" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  .tap-target { min-height: 44px; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
</style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-10">

<div id="auth-root"></div>

<div id="app-root" class="hidden">
  <header class="border-b border-slate-700 bg-slate-800/60 sticky top-0 z-20 backdrop-blur">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <i data-lucide="trees" class="text-emerald-500 w-6 h-6 shrink-0"></i>
        <div class="min-w-0">
          <h1 id="orchard-name" class="text-lg font-semibold leading-tight truncate"></h1>
          <p id="orchard-location" class="text-xs text-slate-400 leading-tight truncate"></p>
        </div>
      </div>
      <div class="flex items-center gap-1 shrink-0">
        <button id="export-btn" title="Descargar una copia de seguridad de todos los cambios" class="tap-target p-2 text-slate-400 hover:text-white">
          <i data-lucide="download" class="w-5 h-5"></i>
        </button>
        <label title="Importar un respaldo de la versión anterior (un solo uso)" class="tap-target p-2 text-slate-400 hover:text-white cursor-pointer">
          <i data-lucide="upload" class="w-5 h-5"></i>
          <input id="import-input" type="file" accept="application/json" class="hidden" />
        </label>
        <button id="logout-btn" title="Cerrar sesión" class="tap-target p-2 text-slate-400 hover:text-white">
          <i data-lucide="log-out" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
    <p id="save-indicator" class="text-[11px] text-center text-slate-500 pb-1 px-4"></p>
  </header>

  <main class="max-w-5xl mx-auto px-4 pt-4 space-y-4">

    <section id="climate-panel" class="rounded-xl border border-slate-700 bg-slate-800 p-4"></section>

    <nav class="flex gap-1 rounded-lg bg-slate-800 border border-slate-700 p-1 text-sm font-medium">
      <button data-tab="map" class="tab-btn flex-1 tap-target rounded-md px-2 py-2 flex items-center justify-center gap-1.5">
        <i data-lucide="layout-grid" class="w-4 h-4"></i> Hileras
      </button>
      <button data-tab="census" class="tab-btn flex-1 tap-target rounded-md px-2 py-2 flex items-center justify-center gap-1.5">
        <i data-lucide="list-checks" class="w-4 h-4"></i> Censo
      </button>
      <button data-tab="tasks" class="tab-btn flex-1 tap-target rounded-md px-2 py-2 flex items-center justify-center gap-1.5">
        <i data-lucide="clipboard-list" class="w-4 h-4"></i> Tareas
      </button>
      <button data-tab="inventory" class="tab-btn flex-1 tap-target rounded-md px-2 py-2 flex items-center justify-center gap-1.5">
        <i data-lucide="sprout" class="w-4 h-4"></i> Inventario
      </button>
    </nav>

    <section id="tab-map" class="tab-panel space-y-5"></section>
    <section id="tab-census" class="tab-panel hidden"></section>
    <section id="tab-tasks" class="tab-panel hidden"></section>
    <section id="tab-inventory" class="tab-panel hidden"></section>

  </main>

  <div id="row-detail-backdrop" class="hidden fixed inset-0 bg-black/60 z-30 flex items-end sm:items-center justify-center p-0 sm:p-4">
    <div id="row-detail-panel" class="bg-slate-800 border border-slate-700 rounded-t-2xl sm:rounded-2xl w-full sm:max-w-md max-h-[85vh] overflow-y-auto"></div>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
